name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      MODULE_NAME: main
      RELEASE_PREFIX: MCGG

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Install curl and libpsl build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake autopoint gettext libtool pkg-config perl

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          version="v$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          short_sha="${GITHUB_SHA::7}"
          asset_base="${RELEASE_PREFIX}-${version}-${short_sha}"
          asset_name="${asset_base}.zip"
          release_notes_path="dist/${asset_base}-release-notes.md"

          {
            echo "version=${version}"
            echo "tag=${version}"
            echo "short_sha=${short_sha}"
            echo "asset_base=${asset_base}"
            echo "asset_name=${asset_name}"
            echo "asset_path=dist/${asset_name}"
            echo "release_notes_path=${release_notes_path}"
            echo "release_name=${RELEASE_PREFIX} ${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build OpenSSL, libpsl, and curl static libraries
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export NDK="$SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          bash jni/build-curl-android.sh

      - name: Build with ndk-build
        env:
          MCGG_BUILD_REPOSITORY: ${{ github.repository }}
          MCGG_BUILD_VERSION: ${{ steps.release_meta.outputs.version }}
          MCGG_BUILD_COMMIT: ${{ github.sha }}
          MCGG_BUILD_REF: ${{ github.ref_name }}
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          "$SDK_ROOT/ndk/$ANDROID_NDK_VERSION/ndk-build" -C jni

      - name: Prepare release package
        id: package
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before || '' }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_ASSET_BASE: ${{ steps.release_meta.outputs.asset_base }}
          RELEASE_ASSET_NAME: ${{ steps.release_meta.outputs.asset_name }}
          RELEASE_NOTES_PATH: ${{ steps.release_meta.outputs.release_notes_path }}
        run: |
          set -euo pipefail

          version="${RELEASE_VERSION}"
          asset_base="${RELEASE_ASSET_BASE}"
          asset_name="${RELEASE_ASSET_NAME}"
          release_notes_path="${RELEASE_NOTES_PATH}"

          mkdir -p dist/"$asset_base"/libs
          cp -R libs/. dist/"$asset_base"/libs/
          cat > dist/"$asset_base"/BUILD_INFO.txt <<EOF
          repository=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          version=${version}
          run_id=${GITHUB_RUN_ID}
          run_number=${GITHUB_RUN_NUMBER}
          run_attempt=${GITHUB_RUN_ATTEMPT}
          ndk=${ANDROID_NDK_VERSION}
          module=${MODULE_NAME}
          EOF

          previous_tag="$(git describe --tags --abbrev=0 --match 'v*' "${GITHUB_SHA}^" 2>/dev/null || true)"
          zero_sha="0000000000000000000000000000000000000000"
          if [[ -n "${EVENT_BEFORE:-}" && "${EVENT_BEFORE}" != "$zero_sha" ]] &&
             git cat-file -e "${EVENT_BEFORE}^{commit}" 2>/dev/null; then
            commit_range="${EVENT_BEFORE}..${GITHUB_SHA}"
            commit_heading="Commit descriptions in this push"
          elif [[ -n "$previous_tag" ]]; then
            commit_range="${previous_tag}..${GITHUB_SHA}"
            commit_heading="Commit descriptions since \`${previous_tag}\`"
          elif git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            commit_range="${GITHUB_SHA}^..${GITHUB_SHA}"
            commit_heading="Commit descriptions"
          else
            commit_range="${GITHUB_SHA}"
            commit_heading="Commit descriptions"
          fi

          {
            echo "Automated build for \`${GITHUB_SHA}\`."
            echo
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Version: \`${version}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo
            echo "## ${commit_heading}"
            echo
            git log --reverse --format='- `%h` %s%n%+b' "$commit_range" |
              awk '/^- `/ { print; next } NF { print "  " $0; next } { print }'
          } > "$release_notes_path"

          (cd dist && zip -r "$asset_name" "$asset_base")

          {
            echo "version=${{ steps.release_meta.outputs.version }}"
            echo "tag=${{ steps.release_meta.outputs.tag }}"
            echo "asset_name=${{ steps.release_meta.outputs.asset_name }}"
            echo "asset_path=${{ steps.release_meta.outputs.asset_path }}"
            echo "release_notes_path=${{ steps.release_meta.outputs.release_notes_path }}"
            echo "release_name=${{ steps.release_meta.outputs.release_name }}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
          RELEASE_NAME: ${{ steps.package.outputs.release_name }}
          RELEASE_ASSET: ${{ steps.package.outputs.asset_path }}
          RELEASE_NOTES: ${{ steps.package.outputs.release_notes_path }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --notes-file "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes-file "$RELEASE_NOTES"
          fi

          echo "Published ${RELEASE_NAME} (${RELEASE_TAG})" >> "$GITHUB_STEP_SUMMARY"
